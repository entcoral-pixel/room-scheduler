{% extends "base.html" %}
{% block title %}Edit booking — Room Scheduler{% endblock %}
{% block content %}
  <h1>Edit booking</h1>
  <p>Room: <strong>{{ room_name }}</strong></p>

  <form method="post" action="{{ url_for('main.edit_booking', room_id=room_id, day_id=day_id, booking_id=booking_id) }}" style="max-width: 24rem">
    <input type="hidden" name="return_bookings_mode" value="{{ return_bookings_mode }}" />
    <input type="hidden" name="return_bookings_room_id" value="{{ return_bookings_room_id }}" />

    <label for="day">Day</label>
    <input id="day" name="day" type="date" required value="{{ day_id }}" />

    <label for="start_time" style="margin-top: 1rem">Start time</label>
    <input id="start_time" name="start_time" type="time" required value="{{ start_time }}" />

    <label for="end_time" style="margin-top: 1rem">End time</label>
    <input id="end_time" name="end_time" type="time" required value="{{ end_time }}" />

    <div style="margin-top: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap">
      <button type="submit">Save changes</button>
      <a href="{{ cancel_href }}" class="secondary" style="display: inline-block; padding: 0.5rem 1rem; border-radius: 0.375rem; background: #334155; color: white; text-decoration: none; font-weight: 600">Cancel</a>
    </div>
  </form>
{% endblock %}
{% block scripts %}
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="{{ url_for('static', filename='js/firebase-login.js') }}"></script>
  <script>
    document.getElementById("logout-btn").addEventListener("click", function () {
      window.firebaseLogin.signOut();
    });
  </script>
{% endblock %}
